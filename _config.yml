baseurl: ""

# Lab Information
lab:
  name: "CARISMA"
  full_name: "Climate change impAct studies for RISk MAnagement"
  tagline: "Research centre on climate change, impacts and risk management"
  department: "Climate, Sustainability and Risk"
  university: "Scuola Universitaria Superiore Pavia"
  location: "Pavia, Italy"
  founded: 2008
  head: "Prof. Marco Gaetani"
  overview:
    intro:
      - "The CARISMA Centre responds to the need for coordination of the numerous disciplinary profiles present in the IUSS that relate to the issues of climate change and sustainable development."
      - "CARISMA is the IUSS reference centre for the National PhD on Sustainable Development and Climate Change."
    objectives:
      - "Data analysis and modelling of the processes of the Earth system and the economic system."
      - "Assessment of the impact on the environment and humans of extreme natural events and human activities, with particular reference to climate change."
      - "Assessment and management of impact-associated risk."
      - "Formulation and proposal of new economic, political and legal models of sustainable development."
    activities:
      - "Evaluation of possible climate evolution and the effects of climate change and climate variability on the environment, on humans and social organizations, in support of sustainable development."
      - "Integration of climate change in risk analysis and management through the use of data and climate modelling."
      - "Development of integrated methodologies to support the overall analysis of the risk associated with complex phenomena of natural and technological origin, including multi-hazard risk assessment."
      - "Improvement of Earth system modelling, including its interactions with social and socio-economic dynamics, to support integrated and cost-effective risk management and decision-making."
  activity_sections:
    - title: "Variability and climate change, extreme events"
      paragraphs:
        - "A core line of research of the centre is the study of climate through observations, satellite products and meteorological reanalysis datasets."
        - "Recent and future anthropogenic climate change, and the related uncertainties, are studied using global and regional climate simulations, including high-resolution experiments from major international programmes."
        - "Special attention is given to extremes such as intense precipitation and heat waves, with a focus on the Mediterranean region and developing countries."
    - title: "Impact of climate on productive activities and human settlements"
      paragraphs:
        - "Research on climate variability and change is paired with impact analysis on the environment and on human activities."
        - "The centre studies floods, droughts, agriculture, energy demand, renewable generation, thermal stress, and implications for buildings and infrastructures."
        - "Statistical downscaling methods are applied to derive climate information at the resolution required for decision-making."
    - title: "Interactions between environment, climate and socio-economic systems"
      paragraphs:
        - "This research area focuses on mitigation strategies and the management of risks linked to ongoing climate change."
        - "Work covers value chains, greenhouse gas emissions, macroeconomic and financial risk, green transition policies, macro-prudential tools and transition risk in carbon-intensive sectors."
        - "Analyses combine agent-based and stock-flow consistent macroeconomic models, network models, econometrics and machine learning."
  projects:
