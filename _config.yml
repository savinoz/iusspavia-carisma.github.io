# Theme Colors (CSS custom properties will use these)
colors:
  primary: "#2563eb"      # Blue
  secondary: "#059669"    # Green
  accent: "#dc2626"       # Red
  dark: "#1f2937"         # Dark gray
  light: "#f9fafb"        # Light gray

# Collections
collections:
  people:
    output: true
    permalink: /people/:name/
  publications:
    output: false
  research:
    output: true
    permalink: /research/:name/
  news:
    output: true
    permalink: /news/:title/

# Build Settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Defaults
defaults:
  - scope:
      path: ""
      type: "news"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "people"
    values:
      layout: "person"
  - scope:
      path: ""
      type: "research"
    values:
      layout: "research"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - LICENSE
